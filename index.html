<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinapromos Landing Page</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
            color: #0f0;
        }
        .matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }
        .matrix span {
            font-family: 'Courier New', monospace;
            color: #0f0;
            white-space: nowrap;
            position: absolute;
            bottom: 100%;
            animation: fall 5s linear infinite;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
        .countdown, .vacancy {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 50px;
        }
        .progress {
            width: 100%;
            height: 20px;
            background-color: #ddd;
        }
        .progress-bar {
            height: 100%;
            background-color: #4caf50;
            text-align: center;
            line-height: 20px;
            color: white;
        }
        .contact-buttons {
            margin-top: 20px;
        }
        .contact-buttons a {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background-color: #25D366; /* WhatsApp color */
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .contact-buttons a.telegram {
            background-color: #0088cc; /* Telegram color */
        }
    </style>
</head>
<body>
    <div class="matrix" id="matrix"></div>
    
    <div class="countdown">
        <h1>Countdown Timer</h1>
        <div id="countdown"></div>
    </div>
    
    <div class="vacancy">
        <h1>Vacancy Counter</h1>
        <div class="progress">
            <div class="progress-bar" id="vacancyBar">0 / 100</div>
        </div>
    </div>
    
    <div class="contact-buttons">
        <a href="https://api.whatsapp.com/send?text=Hello!" target="_blank">Contact on WhatsApp</a>
        <a class="telegram" href="https://t.me/yourtelegram" target="_blank">Contact on Telegram</a>
    </div>

    <script>
        // Countdown Script
        const countdownDate = new Date("2026-12-31T23:59:59Z").getTime();
        const countdownElement = document.getElementById("countdown");
        
        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownElement.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            if (distance < 0) {
                clearInterval(countdownInterval);
                countdownElement.innerHTML = "Time's up!";
            }
        };

        const countdownInterval = setInterval(updateCountdown, 1000);
        
        // Vacancy Counter Script
        let totalVacancies = 100;
        let filledVacancies = 0;
        const vacancyBar = document.getElementById("vacancyBar");

        const updateVacancyCounter = () => {
            if (filledVacancies < totalVacancies) {
                filledVacancies++;
                const percentage = Math.floor((filledVacancies / totalVacancies) * 100);
                vacancyBar.style.width = `${percentage}%`;
                vacancyBar.textContent = `${filledVacancies} / ${totalVacancies}`;
                setTimeout(updateVacancyCounter, 100);
            }
        };

        updateVacancyCounter();
    </script>
</body>
</html>
