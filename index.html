<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VIVA - Produtos Tech e Gamer</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --green:#00ff41; --cyan:#00e5ff; --dark:#020c02; }
html,body { min-height:100%; background:var(--dark); overflow-x:hidden; font-family:'Share Tech Mono',monospace; }
#mx { position:fixed; inset:0; width:100%; height:100%; z-index:0; }
.wrap { position:relative; z-index:1; min-height:100svh; display:flex; justify-content:center; align-items:flex-start; padding:32px 20px 50px; }
.card { width:100%; max-width:390px; display:flex; flex-direction:column; align-items:center; }

/* LOGO */
.logo-ring {
  width:118px; height:118px;
  border-radius:50%;
  border:2.5px solid var(--green);
  box-shadow:0 0 14px var(--green),0 0 40px rgba(0,255,65,.30),inset 0 0 28px rgba(0,255,65,.08);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:#020d02;
  margin-bottom:26px;
  overflow:hidden;
  animation:ring-pulse 2.6s ease-in-out infinite;
}
@keyframes ring-pulse {
  0%,100%{box-shadow:0 0 14px var(--green),0 0 40px rgba(0,255,65,.30);}
  50%    {box-shadow:0 0 26px var(--green),0 0 70px rgba(0,255,65,.55);}
}
.logo-img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

/* HEADLINE */
.headline { font-family:'Press Start 2P',monospace; font-size:clamp(14px,4.6vw,20px); color:#fff; text-align:center; line-height:1.75; letter-spacing:.5px; margin-bottom:11px; text-shadow:0 2px 14px rgba(0,0,0,.7); }
.subline { font-size:clamp(13px,3.6vw,15.5px); color:rgba(255,255,255,.70); text-align:center; margin-bottom:22px; }

/* COUNTDOWN */
.cd-box { width:100%; background:rgba(0,12,0,.82); border:1.5px solid rgba(80,80,80,.50); border-radius:10px; padding:17px 16px 22px; text-align:center; margin-bottom:22px; }
.cd-label { font-size:clamp(9px,2.6vw,12px); color:#fff; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
.cd-timer { font-family:'Share Tech Mono',monospace; font-size:clamp(66px,19vw,90px); color:var(--cyan); text-shadow:0 0 22px var(--cyan),0 0 55px rgba(0,229,255,.50); letter-spacing:10px; line-height:1; animation:flicker 5s infinite; }
@keyframes flicker { 0%,97%,100%{opacity:1;} 98%{opacity:.80;} 99%{opacity:1;} }
.cd-timer.enc { font-family:'Orbitron',sans-serif; font-weight:900; font-size:clamp(34px,10vw,52px); letter-spacing:4px; animation:enc-glow 1.1s ease-in-out infinite; }
@keyframes enc-glow { 0%,100%{text-shadow:0 0 22px var(--cyan),0 0 55px rgba(0,229,255,.50);} 50%{text-shadow:0 0 40px var(--cyan),0 0 95px rgba(0,229,255,.90);} }

/* VAGAS */
.vagas-row { width:100%; text-align:center; margin-bottom:10px; }
.vagas-txt { font-size:clamp(11px,3.1vw,13.5px); color:#fff; letter-spacing:1.2px; text-transform:uppercase; }
.vagas-n { color:#ff9900; text-shadow:0 0 8px rgba(255,153,0,.70); }

/* PROGRESS */
.bar-track { width:100%; height:28px; background:rgba(255,255,255,.06); border-radius:99px; overflow:hidden; position:relative; margin-bottom:22px; }
.bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#e91e8c 0%,#a855f7 50%,#38bdf8 100%); transition:width .9s ease; position:relative; }
.bar-pct { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:13px; font-weight:bold; color:#fff; letter-spacing:1px; text-shadow:0 1px 5px rgba(0,0,0,1); }

/* BUTTONS */
.btn { width:100%; display:flex; align-items:center; justify-content:center; gap:13px; padding:20px 22px; border-radius:50px; border:none; cursor:pointer; font-family:'Orbitron',sans-serif; font-weight:700; font-size:clamp(13px,3.9vw,16px); letter-spacing:1.5px; text-decoration:none; color:#fff; position:relative; overflow:hidden; -webkit-tap-highlight-color:transparent; }

.btn-wpp { background:linear-gradient(135deg,#2ecc71 0%,#12863e 100%); box-shadow:0 0 22px rgba(46,204,113,.60),0 6px 20px rgba(0,0,0,.55); margin-bottom:14px; animation:wpp-pulse 1.8s ease-in-out infinite; }
@keyframes wpp-pulse {
  0%,100%{transform:scale(1);box-shadow:0 0 22px rgba(46,204,113,.60),0 6px 20px rgba(0,0,0,.50);}
  50%{transform:scale(1.036);box-shadow:0 0 42px rgba(46,204,113,.95),0 10px 28px rgba(0,0,0,.45);}
}
.btn-wpp:active{animation:none;transform:scale(.96);}
.btn-wpp::after{content:'';position:absolute;top:0;left:-90%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.26),transparent);animation:shimmer 2.4s ease-in-out infinite;pointer-events:none;}
@keyframes shimmer{0%{left:-90%;}55%,100%{left:130%;}}

.btn-tg { background:linear-gradient(135deg,#54c5f8 0%,#0a90d4 100%); box-shadow:0 0 22px rgba(56,189,248,.55),0 6px 20px rgba(0,0,0,.50); animation:tg-float 2.1s ease-in-out infinite; }
@keyframes tg-float {
  0%,100%{transform:translateY(0px);box-shadow:0 0 22px rgba(56,189,248,.55),0 6px 20px rgba(0,0,0,.50);}
  50%{transform:translateY(-7px);box-shadow:0 0 38px rgba(56,189,248,.85),0 16px 30px rgba(0,0,0,.40);}
}
.btn-tg:active{animation:none;transform:scale(.96);}
.ico{width:27px;height:27px;flex-shrink:0;fill:#fff;}

@media(min-width:480px){.wrap{padding:48px 24px 70px;align-items:center;}}
</style>
</head>
<body>
<canvas id="mx"></canvas>
<div class="wrap">
  <div class="card">

    <!-- LOGO IMAGE -->
    <div class="logo-ring">
      <img class="logo-img" src="LOGO_PLACEHOLDER" alt="VIVA">
    </div>

    <h1 class="headline">PARTICIPE DO GRUPO<br>DE FORMA GRATUITA!</h1>
    <p class="subline">Aproveite agora as melhores promoções!</p>

    <div class="cd-box">
      <div class="cd-label">O ACESSO VIP GRATUITO ENCERRA EM:</div>
      <div class="cd-timer" id="timer">03:00</div>
    </div>

    <div class="vagas-row">
      <p class="vagas-txt">CORRA! RESTAM APENAS <span class="vagas-n" id="vn">189</span> VAGAS!</p>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="bf" style="width:81%">
        <span class="bar-pct" id="bp">81%</span>
      </div>
    </div>

    <a href="#" class="btn btn-wpp">
      <svg class="ico" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      GARANTIR MINHA VAGA AGORA!
    </a>

    <a href="#" class="btn btn-tg">
      <svg class="ico" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
      ENTRAR NO TELEGRAM
    </a>

  </div>
</div>
<script>
(function(){
  const cv=document.getElementById('mx'),ctx=cv.getContext('2d');
  const ch='01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  let cols,drops;
  function init(){cv.width=window.innerWidth;cv.height=window.innerHeight;cols=Math.floor(cv.width/15);drops=Array.from({length:cols},()=>Math.random()*-150);}
  init();window.addEventListener('resize',init);
  setInterval(function(){ctx.fillStyle='rgba(0,9,0,0.043)';ctx.fillRect(0,0,cv.width,cv.height);for(let i=0;i<cols;i++){const b=Math.random()>.94;ctx.fillStyle=b?'#afffcc':'#00ff41';ctx.font='13px "Share Tech Mono",monospace';ctx.fillText(ch[Math.floor(Math.random()*ch.length)],i*15,drops[i]*15);if(drops[i]*15>cv.height&&Math.random()>.974)drops[i]=0;drops[i]++;}},42);
})();
(function(){
  const el=document.getElementById('timer');
  const pad=n=>String(n).padStart(2,'0');
  let left=180;
  const iv=setInterval(function(){left--;if(left<=0){clearInterval(iv);el.textContent='ENCERRADO';el.classList.add('enc');return;}el.textContent=pad(Math.floor(left/60))+':'+pad(left%60);},1000);
})();
(function(){
  const vn=document.getElementById('vn'),bf=document.getElementById('bf'),bp=document.getElementById('bp');
  const TOTAL=1000;let vagas=189;
  function r(){const p=Math.min(99,Math.round(((TOTAL-vagas)/TOTAL)*100));vn.textContent=vagas;bf.style.width=p+'%';bp.textContent=p+'%';}
  r();setInterval(function(){if(vagas<=0)return;vagas=Math.max(0,vagas-(Math.floor(Math.random()*3)+1));r();},15000);
})();
</script>
</body>
</html>
