<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinapromos Landing Page</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
            color: #0f0;
        }
        .matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }
        .matrix span {
            font-family: 'Courier New', monospace;
            color: #0f0;
            white-space: nowrap;
            position: absolute;
            bottom: 100%;
            animation: fall 5s linear infinite;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
        .countdown, .vacancy {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 50px;
        }
        .progress {
            width: 100%;
            height: 20px;
            background-color: #ddd;
        }
        .progress-bar {
            height: 100%;
            background-color: #4caf50;
            text-align: center;
            line-height: 20px;
            color: white;
        }
        .contact-buttons {
            margin-top: 20px;
        }
        .contact-buttons a {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background-color: #25D366; /* WhatsApp color */
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .contact-buttons a.telegram {
            background-color: #0088cc; /* Telegram color */
        }
    </style>
</head>
<body>
    <div class="matrix" id="matrix"></div>
    
    <div class="countdown">
        <h1>Countdown Timer</h1>
        <div id="countdown"></div>
    </div>
    
    <div class="vacancy">
        <h1>Vacancy Counter</h1>
        <div class="progress">
            <div class="progress-bar" id="vacancyBar">0 / 100</div>
        </div>
    </div>
    
    <!-- BUTTONS -->
    <a href="https://chat.whatsapp.com/KRXeKbsqlUrI4ua9MkRvAN" class="btn btn-whatsapp" target="_blank" rel="noopener">

    <a href="https://t.me/+EPXgWX2LTjMzNzgx" class="btn btn-telegram" target="_blank" rel="noopener">

</div>
</div>
<script>
(function(){
  const cv=document.getElementById('mx'),ctx=cv.getContext('2d');
  const ch='01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  let cols,drops;
  function init(){cv.width=window.innerWidth;cv.height=window.innerHeight;cols=Math.floor(cv.width/15);drops=Array.from({length:cols},()=>Math.random()*-150);}
  init();window.addEventListener('resize',init);
  setInterval(function(){ctx.fillStyle='rgba(0,9,0,0.043)';ctx.fillRect(0,0,cv.width,cv.height);for(let i=0;i<cols;i++){const b=Math.random()>.94;ctx.fillStyle=b?'#afffcc':'#00ff41';ctx.font='13px "Share Tech Mono",monospace';ctx.fillText(ch[Math.floor(Math.random()*ch.length)],i*15,drops[i]*15);if(drops[i]*15>cv.height&&Math.random()>.974)drops[i]=0;drops[i]++;}},42);
})();
(function(){
  const el=document.getElementById('timer');
  const pad=n=>String(n).padStart(2,'0');
  let left=180;
  const iv=setInterval(function(){
    left--;
    if(left<=0){clearInterval(iv);el.textContent='ENCERRADO';el.classList.remove('urgent');el.classList.add('enc');return;}
    el.textContent=pad(Math.floor(left/60))+':'+pad(left%60);
    if(left<=30){el.classList.add('urgent');}
  },1000);
})();
(function(){
  const vn=document.getElementById('vn'),bf=document.getElementById('bf'),bp=document.getElementById('bp');
  const TOTAL=1000;let vagas=189;
  function r(){
    const p=Math.min(99,Math.round(((TOTAL-vagas)/TOTAL)*100));
    vn.textContent=vagas;
    bf.style.width=p+'%';
    bp.textContent=p+'%';
  }
  function flash(){
    vn.classList.remove('flash');
    void vn.offsetWidth;
    vn.classList.add('flash');
  }
  r();
  setInterval(function(){
    if(vagas<=0)return;
    vagas=Math.max(0,vagas-(Math.floor(Math.random()*3)+1));
    r();
    flash();
  },15000);
})();
</script>
</body>
</html>
