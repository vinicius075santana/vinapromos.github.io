<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vina Promos</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle, #001a14, #000);
        color: white;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
        text-align: center;
    }

    .logo {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: #0f0;
        margin: 20px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: black;
        box-shadow: 0 0 20px #0f0;
    }

    h1 {
        font-size: 22px;
        margin: 10px 0;
    }

    p {
        opacity: 0.8;
    }

    .timer-box {
        border: 2px solid #00ffcc;
        padding: 20px;
        border-radius: 15px;
        margin: 20px 0;
        box-shadow: 0 0 20px rgba(0,255,200,0.3);
    }

    .timer {
        font-size: 40px;
        color: #00eaff;
        font-weight: bold;
    }

    .vagas {
        margin-top: 10px;
        font-weight: bold;
    }

    .progress {
        width: 100%;
        height: 12px;
        background: #222;
        border-radius: 10px;
        overflow: hidden;
        margin: 10px 0 20px;
    }

    .progress-bar {
        height: 100%;
        width: 80%;
        background: linear-gradient(90deg, #ff00cc, #00eaff);
        transition: width 0.5s;
    }

    .btn {
        display: block;
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        border-radius: 12px;
        font-weight: bold;
        text-decoration: none;
        color: white;
    }

    .whatsapp {
        background: #25D366;
    }

    .telegram {
        background: #229ED9;
    }
</style>
</head>

<body>

<div class="container">

    <div class="logo">VINA</div>

    <h1>PARTICIPE DO GRUPO DE FORMA GRATUITA!</h1>
    <p>Aproveite agora as melhores promoções!</p>

    <div class="timer-box">
        <div>O ACESSO VIP GRATUITO ENCERRA EM:</div>
        <div class="timer" id="timer">03:00</div>
    </div>

    <div class="vagas">
        CORRA! RESTAM APENAS <span id="vagas">189</span> VAGAS!
    </div>

    <div class="progress">
        <div class="progress-bar" id="progress"></div>
    </div>

    <a href="#" class="btn whatsapp">GARANTIR MINHA VAGA AGORA!</a>
    <a href="#" class="btn telegram">ENTRAR NO TELEGRAM</a>

</div>

<script>
    let tempo = 180; // 3 minutos
    let vagas = 189;

    function atualizarTimer() {
        let minutos = Math.floor(tempo / 60);
        let segundos = tempo % 60;

        document.getElementById("timer").innerText =
            `${String(minutos).padStart(2,'0')}:${String(segundos).padStart(2,'0')}`;

        if (tempo <= 0) {
            document.getElementById("timer").innerText = "ENCERRADO";
            clearInterval(contador);
            clearInterval(vagasInterval);
        }

        tempo--;
    }

    const contador = setInterval(atualizarTimer, 1000);

    // Vagas diminuindo
    const vagasInterval = setInterval(() => {
        let diminuir = Math.floor(Math.random() * 3) + 1;
        vagas = Math.max(0, vagas - diminuir);

        document.getElementById("vagas").innerText = vagas;

        // Atualiza barra
        let porcentagem = 100 - (vagas / 189 * 100);
        document.getElementById("progress").style.width = porcentagem + "%";

    }, 15000);
</script>

</body>
</html>
