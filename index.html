<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VIVA - Produtos Tech e Gamer</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --green:#00ff41; --cyan:#00e5ff; --dark:#020c02; }
html,body { min-height:100%; background:var(--dark); overflow-x:hidden; font-family:'Share Tech Mono',monospace; }
#mx { position:fixed; inset:0; width:100%; height:100%; z-index:0; }
.wrap { position:relative; z-index:1; min-height:100svh; display:flex; justify-content:center; align-items:flex-start; padding:32px 20px 50px; }
.card { width:100%; max-width:390px; display:flex; flex-direction:column; align-items:center; }

/* LOGO */
.logo-ring {
  width:118px; height:118px;
  border-radius:50%;
  border:2.5px solid var(--green);
  box-shadow:0 0 14px var(--green),0 0 40px rgba(0,255,65,.30),inset 0 0 28px rgba(0,255,65,.08);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:#020d02;
  margin-bottom:26px;
  overflow:hidden;
  animation:ring-pulse 2.6s ease-in-out infinite;
}
@keyframes ring-pulse {
  0%,100%{box-shadow:0 0 14px var(--green),0 0 40px rgba(0,255,65,.30);}
  50%    {box-shadow:0 0 26px var(--green),0 0 70px rgba(0,255,65,.55);}
}
.logo-img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

/* HEADLINE */
.headline { font-family:'Press Start 2P',monospace; font-size:clamp(14px,4.6vw,20px); color:#fff; text-align:center; line-height:1.75; letter-spacing:.5px; margin-bottom:11px; text-shadow:0 2px 14px rgba(0,0,0,.7); }
.subline { font-size:clamp(13px,3.6vw,15.5px); color:rgba(255,255,255,.70); text-align:center; margin-bottom:22px; }

/* COUNTDOWN */
.cd-box { width:100%; background:rgba(0,12,0,.82); border:1.5px solid rgba(80,80,80,.50); border-radius:10px; padding:17px 12px 22px; text-align:center; margin-bottom:22px; overflow:hidden; }
.cd-label { font-size:clamp(9px,2.6vw,12px); color:#fff; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
.cd-timer { font-family:'Share Tech Mono',monospace; font-size:clamp(66px,19vw,90px); color:var(--cyan); text-shadow:0 0 22px var(--cyan),0 0 55px rgba(0,229,255,.50); letter-spacing:10px; line-height:1; animation:flicker 5s infinite; }
@keyframes flicker { 0%,97%,100%{opacity:1;} 98%{opacity:.80;} 99%{opacity:1;} }
.cd-timer.enc { font-family:'Orbitron',sans-serif; font-weight:900; font-size:clamp(22px,6.5vw,36px); letter-spacing:2px; animation:enc-glow 1.1s ease-in-out infinite; display:block; width:100%; }
@keyframes enc-glow { 0%,100%{text-shadow:0 0 22px var(--cyan),0 0 55px rgba(0,229,255,.50);} 50%{text-shadow:0 0 40px var(--cyan),0 0 95px rgba(0,229,255,.90);} }

/* VAGAS */
.vagas-row { width:100%; text-align:center; margin-bottom:10px; }
.vagas-txt { font-size:clamp(11px,3.1vw,13.5px); color:#fff; letter-spacing:1.2px; text-transform:uppercase; }
.vagas-n { color:#ff9900; text-shadow:0 0 8px rgba(255,153,0,.70); }

/* PROGRESS */
.bar-track { width:100%; height:28px; background:rgba(255,255,255,.06); border-radius:99px; overflow:hidden; position:relative; margin-bottom:22px; }
.bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#e91e8c 0%,#a855f7 50%,#38bdf8 100%); transition:width .9s ease; position:relative; }
.bar-pct { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:13px; font-weight:bold; color:#fff; letter-spacing:1px; text-shadow:0 1px 5px rgba(0,0,0,1); }

/* BUTTONS */
.btn { width:100%; display:flex; align-items:center; justify-content:center; gap:13px; padding:20px 22px; border-radius:50px; border:none; cursor:pointer; font-family:'Orbitron',sans-serif; font-weight:700; font-size:clamp(13px,3.9vw,16px); letter-spacing:1.5px; text-decoration:none; color:#fff; position:relative; overflow:hidden; -webkit-tap-highlight-color:transparent; }

.btn-wpp { background:linear-gradient(135deg,#2ecc71 0%,#12863e 100%); box-shadow:0 0 22px rgba(46,204,113,.60),0 6px 20px rgba(0,0,0,.55); margin-bottom:14px; animation:wpp-pulse 1.8s ease-in-out infinite; }
@keyframes wpp-pulse {
  0%,100%{transform:scale(1);box-shadow:0 0 22px rgba(46,204,113,.60),0 6px 20px rgba(0,0,0,.50);}
  50%{transform:scale(1.036);box-shadow:0 0 42px rgba(46,204,113,.95),0 10px 28px rgba(0,0,0,.45);}
}
.btn-wpp:active{animation:none;transform:scale(.96);}
.btn-wpp::after{content:'';position:absolute;top:0;left:-90%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.26),transparent);animation:shimmer 2.4s ease-in-out infinite;pointer-events:none;}
@keyframes shimmer{0%{left:-90%;}55%,100%{left:130%;}}

.btn-tg { background:linear-gradient(135deg,#54c5f8 0%,#0a90d4 100%); box-shadow:0 0 22px rgba(56,189,248,.55),0 6px 20px rgba(0,0,0,.50); animation:tg-float 2.1s ease-in-out infinite; }
@keyframes tg-float {
  0%,100%{transform:translateY(0px);box-shadow:0 0 22px rgba(56,189,248,.55),0 6px 20px rgba(0,0,0,.50);}
  50%{transform:translateY(-7px);box-shadow:0 0 38px rgba(56,189,248,.85),0 16px 30px rgba(0,0,0,.40);}
}
.btn-tg:active{animation:none;transform:scale(.96);}
.ico{width:27px;height:27px;flex-shrink:0;fill:#fff;}

@media(min-width:480px){.wrap{padding:48px 24px 70px;align-items:center;}}
</style>
</head>
