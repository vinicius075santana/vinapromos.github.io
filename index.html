<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinapromos Landing Page</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
            color: #0f0;
        }
        .matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }
        .matrix span {
            font-family: 'Courier New', monospace;
            color: #0f0;
            white-space: nowrap;
            position: absolute;
            bottom: 100%;
            animation: fall 5s linear infinite;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
        .countdown, .vacancy {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 50px;
        }
        .progress {
            width: 100%;
            height: 20px;
            background-color: #ddd;
        }
        .progress-bar {
            height: 100%;
            background-color: #4caf50;
            text-align: center;
            line-height: 20px;
            color: white;
        }
        .contact-buttons {
            margin-top: 20px;
        }
        .contact-buttons a {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background-color: #25D366; /* WhatsApp color */
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .contact-buttons a.telegram {
            background-color: #0088cc; /* Telegram color */
        }
    </style>
</head>
<body>
    <div class="matrix" id="matrix"></div>
    
    <div class="countdown">
        <h1>Countdown Timer</h1>
        <div id="countdown"></div>
    </div>
    
    <div class="vacancy">
        <h1>Vacancy Counter</h1>
        <div class="progress">
            <div class="progress-bar" id="vacancyBar">0 / 100</div>
        </div>
    </div>
    
    <!-- BUTTONS -->
    <a href="https://chat.whatsapp.com/KRXeKbsqlUrI4ua9MkRvAN" class="btn btn-whatsapp" target="_blank" rel="noopener">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

    <a href="https://t.me/+EPXgWX2LTjMzNzgx" class="btn btn-telegram" target="_blank" rel="noopener">

  </div>
</div>

<script>
  // ─── COUNTDOWN ───────────────────────────────────────────────
  let totalSeconds = 3 * 60; // 3 minutes
  const display = document.getElementById('countdown');

  function pad(n) { return String(n).padStart(2, '0'); }

  function updateCountdown() {
    if (totalSeconds <= 0) {
      display.textContent = 'ENCERRADO';
      display.classList.add('encerrado');
      clearInterval(countdownInterval);
      return;
    }
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    display.textContent = pad(m) + ':' + pad(s);

    // Flash red when under 30s
    if (totalSeconds <= 30) {
      display.style.color = '#ff4d4d';
      display.style.textShadow = '0 0 10px #ff4d4d, 0 0 30px rgba(255,77,77,0.6)';
    }
    totalSeconds--;
  }

  updateCountdown();
  const countdownInterval = setInterval(updateCountdown, 1000);

  // ─── VAGAS + PROGRESS BAR ─────────────────────────────────────
  let vagas = 177;
  const TOTAL_VAGAS = 1000; // fictional total for % calc
  const vagasEl = document.getElementById('vagas-num');
  const bar = document.getElementById('progress-bar');

  function getPct() {
    // percentage of vagas TAKEN = (TOTAL - vagas) / TOTAL
    const taken = TOTAL_VAGAS - vagas;
    const pct = Math.round((taken / TOTAL_VAGAS) * 100);
    return Math.max(0, Math.min(100, pct));
  }

  function updateVagas() {
    const decrement = Math.floor(Math.random() * 3) + 1; // 1–3
    vagas = Math.max(0, vagas - decrement);

    vagasEl.textContent = vagas;
    // trigger flash
    vagasEl.classList.remove('flash');
    void vagasEl.offsetWidth; // reflow
    vagasEl.classList.add('flash');

    const pct = getPct();
    bar.style.width = pct + '%';
    bar.setAttribute('data-pct', pct);
  }

  // Initial bar state
  const initPct = getPct();
  bar.style.width = initPct + '%';
  bar.setAttribute('data-pct', initPct);

  setInterval(updateVagas, 15000);
</script>
</body>
</html>
